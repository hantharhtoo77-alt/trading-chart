<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoe Ree AI Trading Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap');
        body { background-color: #0b0e11; color: #eaecef; font-family: 'Padauk', sans-serif; }
        .stats-card { background: #1e2026; border: 1px solid #303339; border-radius: 12px; }
        .ai-gradient { background: linear-gradient(90deg, #f3ba2f, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .news-item { border-bottom: 1px solid #303339; padding: 12px 0; font-size: 13px; line-height: 1.6; }
        .news-item:last-child { border-bottom: none; }
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        #news-container::-webkit-scrollbar { width: 4px; }
        #news-container::-webkit-scrollbar-thumb { background: #303339; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-6">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-3xl font-bold ai-gradient">BTC AI စနစ် (ကိုဟန်သာ)</h1>
                <p class="text-sm text-gray-400 font-bold uppercase tracking-widest">Real-time Trading Intelligence</p>
            </div>
            <div class="stats-card px-6 py-3 text-center min-w-[180px]">
                <span class="text-[10px] text-gray-500 block uppercase font-bold mb-1">Market Sentiment</span>
                <span id="ai-signal" class="text-lg font-bold text-yellow-500">တွက်ချက်နေသည်...</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Chart & AI Insight -->
            <div class="lg:col-span-3 space-y-6">
                <div class="stats-card h-[500px] overflow-hidden relative shadow-2xl border border-gray-700">
                    <div id="tradingview_chart" class="h-full w-full"></div>
                </div>

                <div class="stats-card p-6 border-l-4 border-yellow-500">
                    <h2 class="text-lg font-bold text-yellow-500 mb-3 flex items-center gap-2">
                        <span>🤖</span> AI ဈေးကွက်သုံးသပ်ချက် (မြန်မာလို)
                    </h2>
                    <div id="ai-insight" class="text-[15px] text-gray-300 leading-relaxed min-h-[100px]">
                        <div class="loading-pulse italic text-gray-500">ဈေးကွက်အခြေအနေကို AI မှ ခွဲမ်းစိတ်ဖြာနေပါသည်...</div>
                    </div>
                </div>
            </div>

            <!-- Stats & News -->
            <div class="space-y-6">
                <div class="stats-card p-5">
                    <h3 class="text-xs font-bold text-gray-500 mb-4 uppercase tracking-tighter">Live Price Levels</h3>
                    <div class="space-y-5">
                        <div class="p-3 rounded-lg bg-red-900/10 border border-red-900/20">
                            <p class="text-[10px] text-red-400 font-bold mb-1">RESISTANCE (ရောင်းရန်)</p>
                            <p id="res-val" class="text-2xl font-mono font-bold text-white">$ --,---</p>
                        </div>
                        <div class="p-3 rounded-lg bg-green-900/10 border border-green-900/20">
                            <p class="text-[10px] text-green-400 font-bold mb-1">SUPPORT (ဝယ်ရန်)</p>
                            <p id="sup-val" class="text-2xl font-mono font-bold text-white">$ --,---</p>
                        </div>
                    </div>
                </div>

                <div class="stats-card p-5 h-[480px] flex flex-col border border-gray-800">
                    <h3 class="text-sm font-bold text-yellow-500 mb-4 uppercase flex items-center gap-2">
                        <span class="w-2 h-2 bg-yellow-500 rounded-full animate-ping"></span>
                        နောက်ဆုံးရသတင်းများ
                    </h3>
                    <div id="news-container" class="overflow-y-auto flex-grow pr-2">
                        <div class="loading-pulse space-y-4">
                            <div class="h-10 bg-gray-800 rounded w-full"></div>
                            <div class="h-10 bg-gray-800 rounded w-3/4"></div>
                            <div class="h-10 bg-gray-800 rounded w-full"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        // ကိုဟန်သာ၏ API Key
        const apiKey = "AIzaSyCHV8fIfLnfglur5EFa6_KX3MVPAM3TsMg";

        // Chart Initialization
        new TradingView.widget({
            "width": "100%", "height": "100%",
            "symbol": "BINANCE:BTCUSDT",
            "interval": "1", "timezone": "Asia/Yangon",
            "theme": "dark", "style": "1", "locale": "en",
            "container_id": "tradingview_chart"
        });

        // AI Market Analysis & Signal
        async function updateAI() {
            try {
                const tickerRes = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
                const ticker = await tickerRes.json();
                
                document.getElementById('res-val').innerText = `$${parseFloat(ticker.highPrice).toLocaleString()}`;
                document.getElementById('sup-val').innerText = `$${parseFloat(ticker.lowPrice).toLocaleString()}`;

                const prompt = `BTC Price is ${ticker.lastPrice}. 24h Change is ${ticker.priceChangePercent}%. 
                ဟန်သာထူးအတွက် အကျဉ်းချုပ် မြန်မာလို သုံးသပ်ပေးပါ။ ဈေးတက်နိုင်လား ကျနိုင်လား၊ ဝယ်သင့်လား ရောင်းသင့်လား အကြံပေးပါ။`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "You are a professional crypto analyst for Han Thar Htoo. Speak Burmese." }] }
                    })
                });

                const result = await response.json();
                const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text || "ခန့်မှန်းချက် ရယူ၍မရပါ။";
                document.getElementById('ai-insight').innerHTML = aiText.replace(/\n/g, '<br>');

                const signal = document.getElementById('ai-signal');
                if (parseFloat(ticker.priceChangePercent) > 0) {
                    signal.innerText = "BULLISH (တက်နိုင်)";
                    signal.className = "text-lg font-bold text-green-500";
                } else {
                    signal.innerText = "BEARISH (ကျနိုင်)";
                    signal.className = "text-lg font-bold text-red-500";
                }
            } catch (e) { console.error(e); }
        }

        // News Fetching with better formatting
        async function updateNews() {
            try {
                const newsPrompt = "Give me 5 bullet points of the most critical Bitcoin and crypto news from the last 24 hours. Focus on market impact.";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: newsPrompt }] }],
                        tools: [{ "google_search": {} }]
                    })
                });

                const result = await response.json();
                // Get grounding source if available, else get text
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "သတင်းများ မရရှိနိုင်သေးပါ။";
                
                const lines = text.split('\n').filter(l => l.trim().length > 5);
                if (lines.length > 0) {
                    document.getElementById('news-container').innerHTML = lines.map(line => 
                        `<div class="news-item"><span class="text-yellow-500 mr-2">●</span> ${line.replace(/[*#]/g, '')}</div>`
                    ).join('');
                } else {
                    document.getElementById('news-container').innerHTML = "<p class='text-gray-500 text-xs'>သတင်းအသစ်များ မရှိသေးပါ။</p>";
                }
            } catch (e) {
                console.error("News Error:", e);
                document.getElementById('news-container').innerHTML = "<p class='text-red-500 text-xs'>သတင်းရယူရာတွင် အခက်အခဲရှိနေပါသည်။</p>";
            }
        }

        window.onload = () => {
            updateAI();
            updateNews();
            setInterval(updateAI, 60000); // 1 min
            setInterval(updateNews, 300000); // 5 mins
        };
    </script>
</body>
</html>
