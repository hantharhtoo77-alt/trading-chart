<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoe Ree Trading Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0b0e11; color: #eaecef; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 32, 38, 0.7); backdrop-filter: blur(10px); border: 1px solid #303339; }
        #chart-container { height: 500px; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-yellow-500">BTC/USDT Live</h1>
                <p class="text-gray-400">Phoe Ree's Custom Strategy Dashboard</p>
            </div>
            <div class="glass-panel p-4 rounded-xl flex items-center gap-6">
                <div class="text-center">
                    <p class="text-xs text-gray-500 uppercase">Live Price</p>
                    <p id="current-price" class="text-2xl font-mono font-bold text-green-500">Connecting...</p>
                </div>
                <div class="text-center">
                    <p class="text-xs text-gray-500 uppercase">Signal</p>
                    <p id="prediction-signal" class="text-xl font-bold text-yellow-400">WAIT</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 glass-panel rounded-2xl p-4">
                <div id="chart-container"></div>
            </div>
            <div class="flex flex-col gap-6">
                <div class="glass-panel p-5 rounded-2xl">
                    <h2 class="text-lg font-bold mb-4">Zones</h2>
                    <p class="text-xs text-red-400 font-bold">RESISTANCE: <span id="res-zone" class="text-white">---</span></p>
                    <p class="text-xs text-green-400 font-bold mt-2">SUPPORT: <span id="sup-zone" class="text-white">---</span></p>
                </div>
                <div class="glass-panel p-5 rounded-2xl h-64 overflow-hidden">
                    <h2 class="text-lg font-bold mb-4">Signal Log</h2>
                    <div id="signal-log" class="text-xs space-y-2 overflow-y-auto h-40"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const symbol = 'btcusdt';
        const chartElement = document.getElementById('chart-container');
        let chart, candlestickSeries;

        function initChart() {
            chart = LightweightCharts.createChart(chartElement, {
                layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#1f2226' }, horzLines: { color: '#1f2226' } },
                timeScale: { timeVisible: true, secondsVisible: false }
            });
            candlestickSeries = chart.addCandlestickSeries();
            fetchData();
        }

        async function fetchData() {
            try {
                // အလုပ်လုပ်နိုင်ခြေအရှိဆုံး API Endpoint ကို သုံးထားပါတယ်
                const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol.toUpperCase()}&interval=1m&limit=100`);
                const data = await response.json();
                const formattedData = data.map(d => ({
                    time: d[0] / 1000,
                    open: parseFloat(d[1]),
                    high: parseFloat(d[2]),
                    low: parseFloat(d[3]),
                    close: parseFloat(d[4])
                }));
                
                // Color Logic
                const coloredData = formattedData.map(d => {
                    const diff = Math.abs(d.close - d.open) / d.open;
                    const color = diff > 0.0005 ? '#00ff00' : '#ff4444';
                    return { ...d, color, wickColor: color };
                });

                candlestickSeries.setData(coloredData);
                connectWebSocket();
                
                // Support/Resistance calculation
                const highs = formattedData.map(d => d.high);
                const lows = formattedData.map(d => d.low);
                document.getElementById('res-zone').innerText = Math.max(...highs.slice(-20)).toFixed(2);
                document.getElementById('sup-zone').innerText = Math.min(...lows.slice(-20)).toFixed(2);

            } catch (e) {
                console.log("Retrying with backup...");
                setTimeout(fetchData, 5000);
            }
        }

        function connectWebSocket() {
            // New 2026 Binance WebSocket Architecture
            const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol}@kline_1m`);
            
            ws.onmessage = (msg) => {
                const data = JSON.parse(msg.data);
                const k = data.k;
                const close = parseFloat(k.c);
                const open = parseFloat(k.o);
                const diff = Math.abs(close - open) / open;
                const color = diff > 0.0005 ? '#00ff00' : '#ff4444';

                document.getElementById('current-price').innerText = `$ ${close}`;
                
                candlestickSeries.update({
                    time: k.t / 1000,
                    open: open,
                    high: parseFloat(k.h),
                    low: parseFloat(k.l),
                    close: close,
                    color: color,
                    wickColor: color
                });
            };

            ws.onerror = () => setTimeout(connectWebSocket, 5000);
        }

        window.onload = initChart;
    </script>
</body>
</html>
