<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Han Thar Trading Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0b0e11; color: #eaecef; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 32, 38, 0.7); backdrop-filter: blur(10px); border: 1px solid #303339; }
        #chart-container { height: 500px; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header Section -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-yellow-500">BTC/USDT Trading View</h1>
                <p class="text-gray-400">ကိုဟန်သာ၏ ကိုယ်ပိုင် Strategy ခွဲခြမ်းစိတ်ဖြာမှု</p>
            </div>
            <div class="glass-panel p-4 rounded-xl flex items-center gap-6">
                <div class="text-center">
                    <p class="text-xs text-gray-500 uppercase">Live Price</p>
                    <p id="current-price" class="text-2xl font-mono font-bold text-green-500">Loading...</p>
                </div>
                <div class="text-center">
                    <p class="text-xs text-gray-500 uppercase">Signal</p>
                    <p id="prediction-signal" class="text-xl font-bold text-yellow-400">WAIT</p>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Chart Section -->
            <div class="lg:col-span-3 glass-panel rounded-2xl overflow-hidden p-4">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-sm font-semibold flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-yellow-500 animate-pulse"></span> Live Market
                    </span>
                    <div class="flex gap-2">
                        <span class="px-2 py-1 bg-gray-700 rounded text-xs">Strategy: Big/Green, Small/Red</span>
                    </div>
                </div>
                <div id="chart-container"></div>
            </div>

            <!-- Analysis & Prediction Sidebar -->
            <div class="flex flex-col gap-6">
                <div class="glass-panel p-5 rounded-2xl">
                    <h2 class="text-lg font-bold mb-4 border-b border-gray-700 pb-2">Technical Zones</h2>
                    <div class="space-y-4">
                        <div>
                            <p class="text-xs text-red-400 font-bold mb-1">RESISTANCE ZONE (ရောင်းအားများ)</p>
                            <div id="res-zone" class="bg-red-900/20 border border-red-500/50 p-2 rounded text-center font-mono">---</div>
                        </div>
                        <div>
                            <p class="text-xs text-green-400 font-bold mb-1">SUPPORT ZONE (ဝယ်အားများ)</p>
                            <div id="sup-zone" class="bg-green-900/20 border border-green-500/50 p-2 rounded text-center font-mono">---</div>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-5 rounded-2xl flex-grow">
                    <h2 class="text-lg font-bold mb-4 border-b border-gray-700 pb-2">Prediction Log</h2>
                    <div id="signal-log" class="text-sm space-y-2 h-48 overflow-y-auto pr-2 scrollbar-hide">
                        <p class="text-gray-500 italic text-xs text-center">ဈေးနှုန်းစောင့်ဆိုင်းနေပါသည်...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- အခြေခံ Variable များ ---
        const symbol = 'BTCUSDT';
        const chartElement = document.getElementById('chart-container');
        const priceDisplay = document.getElementById('current-price');
        const signalDisplay = document.getElementById('prediction-signal');
        const logContainer = document.getElementById('signal-log');
        
        let chart, candlestickSeries;
        let lastPrice = 0;
        const changeThreshold = 0.0001; // "Big" သတ်မှတ်ချက် % (ဥပမာ 0.01%)

        // --- Chart စတင်ခြင်း ---
        function initChart() {
            chart = LightweightCharts.createChart(chartElement, {
                layout: { backgroundColor: 'transparent', textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#1f2226' }, horzLines: { color: '#1f2226' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                priceScale: { borderColor: '#485c7b' },
                timeScale: { borderColor: '#485c7b', timeVisible: true },
            });

            candlestickSeries = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350', 
                borderVisible: false, wickVisible: true,
            });

            // Sample Data (သရုပ်ပြရန်)
            fetchInitialData();
        }

        // --- Binance API မှ Data ရယူခြင်း ---
        async function fetchInitialData() {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=100`);
                const data = await response.json();
                const formattedData = data.map(d => ({
                    time: d[0] / 1000,
                    open: parseFloat(d[1]),
                    high: parseFloat(d[2]),
                    low: parseFloat(d[3]),
                    close: parseFloat(d[4])
                }));
                
                // Custom Color Logic အသုံးပြုခြင်း
                const coloredData = formattedData.map(d => {
                    const diff = Math.abs(d.close - d.open) / d.open;
                    const color = diff > changeThreshold ? '#00ff00' : '#ff4444';
                    return { ...d, color, wickColor: color };
                });

                candlestickSeries.setData(coloredData);
                calculateSupportResistance(formattedData);
                startLiveUpdates();
            } catch (error) {
                console.error("Data fetch error:", error);
            }
        }

        // --- Support & Resistance တွက်ချက်ခြင်း (Simple Pivot Point Logic) ---
        function calculateSupportResistance(data) {
            const highs = data.map(d => d.high);
            const lows = data.map(d => d.low);
            const close = data[data.length - 1].close;

            const res = Math.max(...highs.slice(-10)); // လတ်တလော အမြင့်ဆုံး
            const sup = Math.min(...lows.slice(-10));  // လတ်တလော အနိမ့်ဆုံး

            document.getElementById('res-zone').innerText = res.toFixed(2);
            document.getElementById('sup-zone').innerText = sup.toFixed(2);
        }

        // --- Live WebSocket Connection ---
        function startLiveUpdates() {
            const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@kline_1m`);
            
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                const k = msg.k;
                const closePrice = parseFloat(k.c);
                const openPrice = parseFloat(k.o);

                // UI Update
                priceDisplay.innerText = `$ ${closePrice.toLocaleString()}`;
                priceDisplay.classList.toggle('text-green-500', closePrice >= lastPrice);
                priceDisplay.classList.toggle('text-red-500', closePrice < lastPrice);
                lastPrice = closePrice;

                // Color Strategy Logic
                const diff = Math.abs(closePrice - openPrice) / openPrice;
                const candleColor = diff > changeThreshold ? '#00ff00' : '#ff4444';

                candlestickSeries.update({
                    time: k.t / 1000,
                    open: openPrice,
                    high: parseFloat(k.h),
                    low: parseFloat(k.l),
                    close: closePrice,
                    color: candleColor,
                    wickColor: candleColor
                });

                // Prediction Logic (Simple RSI based)
                makePrediction(closePrice, openPrice, diff);
            };
        }

        // --- Signal Prediction ---
        function makePrediction(close, open, diff) {
            const res = parseFloat(document.getElementById('res-zone').innerText);
            const sup = parseFloat(document.getElementById('sup-zone').innerText);
            
            let signal = "NEUTRAL";
            let colorClass = "text-yellow-400";

            if (close <= sup + 5) {
                signal = "BUY (STRONG)";
                colorClass = "text-green-500";
                addToLog("ဈေးနှုန်း Support Zone သို့ရောက်နေသည် - ဝယ်ရန်သင့်တော်သည်", "green");
            } else if (close >= res - 5) {
                signal = "SELL (STRONG)";
                colorClass = "text-red-500";
                addToLog("ဈေးနှုန်း Resistance Zone သို့ရောက်နေသည် - ရောင်းရန်သင့်တော်သည်", "red");
            } else if (diff > changeThreshold && close > open) {
                signal = "MOMENTUM UP";
                colorClass = "text-green-400";
            }

            signalDisplay.innerText = signal;
            signalDisplay.className = `text-xl font-bold ${colorClass}`;
        }

        function addToLog(msg, type) {
            const p = document.createElement('p');
            p.className = `p-2 rounded bg-gray-800 border-l-4 ${type === 'green' ? 'border-green-500' : 'border-red-500'} text-xs`;
            p.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            
            if (logContainer.firstChild && logContainer.firstChild.innerText.includes(msg)) return;
            
            logContainer.prepend(p);
            if (logContainer.children.length > 10) logContainer.lastChild.remove();
        }

        window.onload = initChart;
    </script>
</body>
</html>
