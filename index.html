<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoe Ree AI Trading Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap');
        body { background-color: #0b0e11; color: #eaecef; font-family: 'Padauk', sans-serif; overflow-x: hidden; }
        .stats-card { background: #1e2026; border: 1px solid #303339; border-radius: 12px; }
        .tab-btn { padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; border: 1px solid #303339; transition: all 0.2s; text-align: center; }
        .tab-active { background: #f3ba2f; color: #000; border-color: #f3ba2f; box-shadow: 0 0 15px rgba(243, 186, 47, 0.3); }
        .ai-gradient { background: linear-gradient(90deg, #f3ba2f, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .news-item { border-bottom: 1px solid #303339; padding: 14px 0; font-size: 13px; line-height: 1.6; }
        .news-item:last-child { border-bottom: none; }
        .loading-shimmer { background: linear-gradient(90deg, #1e2026 25%, #2a2d35 50%, #1e2026 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        #news-container::-webkit-scrollbar { width: 4px; }
        #news-container::-webkit-scrollbar-thumb { background: #303339; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-6">
    <div class="max-w-7xl mx-auto">
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold ai-gradient">ကိုဟန်သာ (Phoe Ree) AI Trading</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <p class="text-xs text-gray-400 uppercase tracking-widest font-bold">Live Market Analysis System</p>
                </div>
            </div>
            
            <div id="coin-tabs" class="grid grid-cols-2 md:flex gap-2 w-full md:w-auto">
                <div onclick="changeCoin('BTCUSDT', 'Bitcoin')" class="tab-btn tab-active" id="btn-BTCUSDT">BTC</div>
                <div onclick="changeCoin('BNBUSDT', 'Binance Coin')" class="tab-btn" id="btn-BNBUSDT">BNB</div>
                <div onclick="changeCoin('RENDERUSDT', 'Render')" class="tab-btn" id="btn-RENDERUSDT">RENDER</div>
                <div onclick="changeCoin('TIAUSDT', 'Celestia')" class="tab-btn" id="btn-TIAUSDT">TIA</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Main Display -->
            <div class="lg:col-span-3 space-y-6">
                <!-- Trading Chart -->
                <div class="stats-card h-[550px] overflow-hidden relative shadow-2xl border border-gray-700">
                    <div id="tradingview_chart" class="h-full w-full"></div>
                </div>

                <!-- AI Analysis -->
                <div class="stats-card p-6 border-l-4 border-yellow-500 bg-gradient-to-r from-[#1e2026] to-[#16181d]">
                    <h2 class="text-lg font-bold text-yellow-500 mb-4 flex items-center gap-2">
                        <span id="ai-coin-name">BTC</span> - AI ဈေးကွက်သုံးသပ်ချက် (မြန်မာလို)
                    </h2>
                    <div id="ai-insight" class="text-[15px] text-gray-300 leading-relaxed min-h-[120px]">
                        <div class="space-y-3">
                            <div class="h-4 loading-shimmer rounded w-3/4"></div>
                            <div class="h-4 loading-shimmer rounded w-full"></div>
                            <div class="h-4 loading-shimmer rounded w-5/6"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Side Sidebar -->
            <div class="space-y-6">
                <!-- Price Stats Card -->
                <div class="stats-card p-5">
                    <h3 class="text-xs font-bold text-gray-500 mb-4 uppercase tracking-wider">Live Data Stats</h3>
                    <div class="space-y-4">
                        <div class="p-4 rounded-xl bg-black/30 border border-gray-800 text-center">
                            <p class="text-[10px] text-yellow-500 font-bold uppercase mb-1">Current Price</p>
                            <p id="live-price" class="text-2xl font-mono font-bold text-white">$ --,---</p>
                            <p id="price-change" class="text-xs mt-1">--%</p>
                        </div>
                        
                        <div class="space-y-2">
                            <div class="flex justify-between items-center p-3 rounded-lg bg-red-900/10 border border-red-900/20">
                                <span class="text-[10px] text-red-400 font-bold">RESISTANCE</span>
                                <span id="res-val" class="font-mono text-white font-bold">--</span>
                            </div>
                            <div class="flex justify-between items-center p-3 rounded-lg bg-green-900/10 border border-green-900/20">
                                <span class="text-[10px] text-green-400 font-bold">SUPPORT</span>
                                <span id="sup-val" class="font-mono text-white font-bold">--</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- News Card -->
                <div class="stats-card p-5 h-[520px] flex flex-col border border-gray-800">
                    <h3 class="text-sm font-bold text-yellow-500 mb-4 uppercase flex items-center gap-2">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-yellow-500"></span>
                        </span>
                        နောက်ဆုံးရသတင်းများ
                    </h3>
                    <div id="news-container" class="overflow-y-auto flex-grow pr-2 text-gray-400">
                        <div class="space-y-4">
                            <div class="h-12 loading-shimmer rounded w-full"></div>
                            <div class="h-12 loading-shimmer rounded w-full"></div>
                            <div class="h-12 loading-shimmer rounded w-full"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        const apiKey = "AIzaSyCHV8fIfLnfglur5EFa6_KX3MVPAM3TsMg";
        let currentSymbol = "BTCUSDT";
        let currentName = "Bitcoin";

        function initChart(symbol) {
            new TradingView.widget({
                "width": "100%", "height": "100%",
                "symbol": `BINANCE:${symbol}`,
                "interval": "15", "timezone": "Asia/Yangon",
                "theme": "dark", "style": "1", "locale": "en",
                "toolbar_bg": "#1e2026",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tradingview_chart"
            });
        }

        function changeCoin(symbol, name) {
            currentSymbol = symbol;
            currentName = name;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById(`btn-${symbol}`).classList.add('tab-active');
            document.getElementById('ai-coin-name').innerText = symbol.replace('USDT', '');
            
            // Show loaders
            document.getElementById('ai-insight').innerHTML = '<div class="space-y-3"><div class="h-4 loading-shimmer rounded w-3/4"></div><div class="h-4 loading-shimmer rounded w-full"></div></div>';
            document.getElementById('news-container').innerHTML = '<div class="space-y-4"><div class="h-12 loading-shimmer rounded w-full"></div><div class="h-12 loading-shimmer rounded w-full"></div></div>';
            
            initChart(symbol);
            updateAI();
            updateNews();
        }

        async function updateAI() {
            try {
                const tickerRes = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${currentSymbol}`);
                const ticker = await tickerRes.json();
                
                const lastPrice = parseFloat(ticker.lastPrice);
                const priceChange = parseFloat(ticker.priceChangePercent);
                
                document.getElementById('live-price').innerText = `$${lastPrice.toLocaleString()}`;
                document.getElementById('res-val').innerText = `$${parseFloat(ticker.highPrice).toLocaleString()}`;
                document.getElementById('sup-val').innerText = `$${parseFloat(ticker.lowPrice).toLocaleString()}`;
                
                const changeEl = document.getElementById('price-change');
                changeEl.innerText = `${priceChange > 0 ? '+' : ''}${priceChange}%`;
                changeEl.className = `text-xs mt-1 font-bold ${priceChange > 0 ? 'text-green-500' : 'text-red-500'}`;

                const prompt = `Current ${currentName} (${currentSymbol}) price is $${lastPrice}. 24h change is ${priceChange}%. 
                ဟန်သာထူး အတွက် ဒီနေ့ ${currentName} အခြေအနေကို မြန်မာလို အကျဉ်းချုပ် သုံးသပ်ပေးပါ။ အချက်အလက် (၃) ချက်လောက်ပဲ လိုရင်းကို မြန်မာလို ရေးပေးပါ။`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "You are a crypto expert for Han Thar Htoo. Be concise and respond in Burmese." }] }
                    })
                });

                const result = await response.json();
                const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text || "ခန့်မှန်းချက် မရနိုင်ပါ။";
                document.getElementById('ai-insight').innerHTML = aiText.replace(/\n/g, '<br>');

            } catch (e) { console.error(e); }
        }

        async function updateNews() {
            try {
                // News prompt specifically for the selected coin
                const newsPrompt = `Find and summarize the latest 4-5 crypto news headlines for ${currentName} (${currentSymbol}) from the last 24 hours. Summarize each news in 1 short sentence in English. Today is March 19, 2026.`;
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: newsPrompt }] }],
                        tools: [{ "google_search": {} }]
                    })
                });

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
                
                const lines = text.split('\n').filter(l => l.trim().length > 10).slice(0, 6);
                
                if (lines.length > 0) {
                    document.getElementById('news-container').innerHTML = lines.map(line => 
                        `<div class="news-item"><span class="text-yellow-500 font-bold mr-2">▶</span> ${line.replace(/[*#-]/g, '').trim()}</div>`
                    ).join('');
                } else {
                    document.getElementById('news-container').innerHTML = "<p class='text-gray-500 text-xs italic'>လတ်တလော သတင်းအသစ် မတွေ့ရသေးပါ။ ခဏနေ ပြန်ကြည့်ပေးပါ။</p>";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('news-container').innerHTML = "<p class='text-red-500 text-xs'>သတင်းချိတ်ဆက်မှု အဆင်မပြေပါ။</p>";
            }
        }

        window.onload = () => {
            initChart('BTCUSDT');
            updateAI();
            updateNews();
            // Refresh prices every 20 seconds, News every 5 mins
            setInterval(updateAI, 20000);
            setInterval(updateNews, 300000);
        };
    </script>
</body>
</html>
